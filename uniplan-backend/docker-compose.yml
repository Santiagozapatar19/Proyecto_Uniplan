version: '3.8'

services:

  # ── PostgreSQL UniPlan ─────────────────────────────────────────────
  postgres-uniplan:
    image: postgres:16
    container_name: uniplan_db
    restart: always
    environment:
      POSTGRES_USER: uniplan_user
      POSTGRES_PASSWORD: uniplan_pass
      POSTGRES_DB: uniplan_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_uniplan_data:/var/lib/postgresql/data
      - ./sql/uniplan-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - uniplan_network

  # ── PostgreSQL Institucional ───────────────────────────────────────
  postgres-institucional:
    image: postgres:16
    container_name: institucional_db
    restart: always
    environment:
      POSTGRES_USER: inst_readonly
      POSTGRES_PASSWORD: inst_pass
      POSTGRES_DB: universidad_db
    ports:
      - '5433:5432'        # puerto diferente para no chocar con la otra
    volumes:
      - postgres_inst_data:/var/lib/postgresql/data
      - ./sql/institucional-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - uniplan_network

  # ── MongoDB ───────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: uniplan_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_pass
      MONGO_INITDB_DATABASE: uniplan_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - uniplan_network

  # ── NestJS Backend ────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uniplan_backend
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - postgres-uniplan
      - postgres-institucional
      - mongodb
    networks:
      - uniplan_network

volumes:
  postgres_uniplan_data:
  postgres_inst_data:
  mongo_data:

networks:
  uniplan_network:
    driver: bridge